type: Index
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
description: >-
  AlternativeTo is a crowdsourced software discovery platform that helps users find
  alternatives to software products based on user recommendations across desktop,
  mobile, and web applications. The platform does not currently offer a public API,
  but provides partner integration opportunities for software vendors.
