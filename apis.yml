  - type: Features
    data:
      - name: Software Alternative Discovery
        description: >-
          Crowdsourced database of software alternatives with user voting,
          ratings, and comparisons across web, desktop, and mobile platforms.
      - name: Platform Filtering
        description: >-
          Filter alternatives by platform (Windows, Mac, Linux, Android, iPhone,
          Online) and license type (open source, free, commercial).
      - name: User Reviews and Ratings
        description: >-
          Community-driven reviews and rating system for software products
          with likes and alternative recommendations.
      - name: Software Vendor Listings
        description: >-
          Vendor-managed software listings with features, screenshots, and
          links for software discovery and comparison.
  - type: UseCases
    data:
      - name: Software Discovery
        description: >-
          Find alternatives to discontinued, expensive, or unavailable software
          products based on crowdsourced community recommendations.
      - name: Open Source Alternatives
        description: >-
          Discover free and open source alternatives to commercial software
          products with platform filtering and license search.
      - name: Vendor Software Listing
        description: >-
          Software vendors can list their products on AlternativeTo to reach
          users searching for alternatives to competing products.
